<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Project — Fairooz Samira</title>
  <meta name="description" content="Full project sheets, presented as originally laid out in the portfolio." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,500;1,400;1,500&family=Space+Grotesk:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <header class="site-header"></header>

  <div class="project-header" id="project-header"><!-- filled by assets/js/main.js --></div>

  <main class="gallery" id="gallery"><!-- one .sheet per original PDF page --></main>

  <nav class="project-nav" id="project-nav" aria-label="Other projects"></nav>

  <footer class="site-footer"></footer>

  <!-- Lightbox: full-screen sheet viewer with prev/next -->
  <div class="lightbox" id="lightbox">
    <div class="lightbox-bar">
      <button class="lightbox-close" id="lightbox-close" aria-label="Close">&times;</button>
      <span id="lightbox-counter"></span>
    </div>
    <button class="lightbox-arrow prev" id="lightbox-prev" aria-label="Previous sheet">&#8249;</button>
    <img id="lightbox-img" src="" alt="" />
    <button class="lightbox-arrow next" id="lightbox-next" aria-label="Next sheet">&#8250;</button>
  </div>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
